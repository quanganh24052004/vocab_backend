name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read
  packages: write
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Dùng lowercase cho repo owner để tránh lỗi registry
          tags: ghcr.io/${{ github.repository_owner }}/vocab-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/vocab-app
            
            # 1. Cập nhật mật khẩu/biến môi trường từ GitHub Secrets (QUAN TRỌNG)
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 2. Đăng nhập để kéo Image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Kéo bản mới và ép khởi động lại để nhận .env mới
            docker compose pull api
            docker compose up -d --force-recreate api
            
            # 4. Dọn dẹp
            docker image prune -f