name: Admin Panel CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'admin-panel/**' # Đảm bảo thư mục này đúng tên trên GitHub
      - '.github/workflows/admin-ci.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel # Nếu thư mục của bạn là 'admin' hãy sửa lại đây
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vocab-admin:latest
          build-args: |
            VITE_API_URL=https://api.amidemy.uk/api/v1

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/vocab-app
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull admin
            docker compose up -d --force-recreate admin
            docker image prune -f