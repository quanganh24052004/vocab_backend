name: Admin Panel CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'admin-panel/**' # Chạy khi có thay đổi trong thư mục admin
      - '.github/workflows/admin-ci.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }} # Dùng token bạn vừa tạo

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel
          push: true
          tags: ghcr.io/${{ github.actor }}/vocab-admin:latest
          build-args: |
            VITE_API_URL=https://api.amidemy.uk/api/v1

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/vocab-app
            
            # 1. Đăng nhập Docker trên VPS bằng Token mới
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Ghi đè file .env từ GitHub Secret
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 3. Kéo bản build mới nhất của Admin
            docker compose pull admin
            
            # 4. Khởi động lại container (áp dụng cả .env mới)
            docker compose up -d admin
            
            # 5. Dọn dẹp Image cũ để tránh đầy ổ cứng VPS
            docker image prune -f